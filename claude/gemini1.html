<!DOCTYPE html>
<html>
  <head>
    <title>Carousel</title>
    <style>
      .carousel {
        position: relative;
        width: 100%;
        height: 100vh; /* Adjust height as needed */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .carousel-inner {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.5s ease-in-out;
      }

      .carousel-inner img {
        max-width: 100%;
        max-height: 100%;
      }

      .prev,
      .next,
      .autoplay-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        font-size: 24px;
        padding: 10px;
        border: none;
        cursor: pointer;
      }

      .prev {
        left: 20px;
      }

      .next {
        right: 20px;
      }

      .autoplay-btn {
        top: 20px;
        right: 20px;
      }
      /* Your CSS will go here */
    </style>
  </head>
  <body>
    <div class="carousel">
      <button class="prev">&#10092;</button>
      <button class="next">&#10093;</button>
      <div class="carousel-inner">
        <img src="https://picsum.photos/800/400?random=1" alt="Image 1" />
        <img src="https://picsum.photos/800/400?random=2" alt="Image 2" />
        <img src="https://picsum.photos/800/400?random=3" alt="Image 3" />
        <img src="https://picsum.photos/800/400?random=4" alt="Image 4" />
        <img src="https://picsum.photos/800/400?random=5" alt="Image 5" />
        <img src="../photos/image003.jpg" alt="Image 03" />
        <img
          src="https://via.placeholder.com/1920x1080/FF0000/FFFFFF?text=Slide+1"
          alt="Slide 1"
        />
        <img
          src="https://via.placeholder.com/1920x1080/00FF00/FFFFFF?text=Slide+2"
          alt="Slide 2"
        />
        <img
          src="https://via.placeholder.com/1920x1080/0000FF/FFFFFF?text=Slide+3"
          alt="Slide 3"
        />
      </div>
      <button class="autoplay-btn">Start</button>
    </div>
    <script>
            /const carousel = document.querySelector('.carousel');
      const carouselInner = document.querySelector('.carousel-inner');
      const prevBtn = document.querySelector('.prev');
      const nextBtn = document.querySelector('.next');
      const images = carouselInner.querySelectorAll('img');
      const autoplayBtn = document.querySelector('.autoplay-btn');

      let currentIndex = 0;
      let autoplayInterval;

      function showSlide(index) {
        carouselInner.style.transform = `translateX(-${index * 100}%)`;
        currentIndex = index;
      }

      function nextSlide() {
        if (currentIndex < images.length - 1) {
          showSlide(currentIndex + 1);
        } else {
          showSlide(0);
        }
      }

      function prevSlide() {
        if (currentIndex > 0) {
          showSlide(currentIndex - 1);
        } else {
          showSlide(images.length - 1);
        }
      }

      prevBtn.addEventListener('click', prevSlide);
      nextBtn.addEventListener('click', nextSlide);

      function startAutoplay() {
        autoplayInterval = setInterval(nextSlide, 3000);
        autoplayBtn.textContent = 'Stop';
        autoplayBtn.style.backgroundColor = 'green';
      }

      function stopAutoplay() {
        clearInterval(autoplayInterval);
        autoplayBtn.textContent = 'Start';
        autoplayBtn.style.backgroundColor = 'red';
      }

      autoplayBtn.addEventListener('click', () => {
        if (autoplayInterval) {
          stopAutoplay();
        } else {
          startAutoplay();
        }
      });

      carousel.addEventListener('click', stopAutoplay);

      // Initial start
      startAutoplay();
      * Your JavaScript will go here */
    </script>
  </body>
</html>
